version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: sos_db_v2
    restart: always
    environment:
      - POSTGRES_DB=nnauru
      - POSTGRES_USER=nnauru
      - POSTGRES_PASSWORD=me4nnauru
    volumes:
      - sos_db_data_v2:/var/lib/postgresql/data
    networks:
      - sos_internal

  backend:
    build: ./apps/backend-v2
    container_name: sos_backend_v2
    restart: always
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgresql://nnauru:me4nnauru@db:5432/nnauru?schema=public
      - PORT=3011
      - NODE_ENV=production
      - UPLOADS_DIR=/app/uploads
    volumes:
      - ./uploads:/app/uploads
    networks:
      - sos_internal
      - wagmoo_wagmoo_net
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=wagmoo_wagmoo_net"
      - "traefik.http.routers.sos-api.rule=Host(`api-sosplanete.nnauru.net`)"
      - "traefik.http.routers.sos-api.entrypoints=websecure"
      - "traefik.http.routers.sos-api.tls.certresolver=myresolver"
      - "traefik.http.services.sos-api.loadbalancer.server.port=3011"

  frontend:
    build: 
      context: ./apps/frontend-v2
      args:
        - NEXT_PUBLIC_API_URL=https://api-sosplanete.nnauru.net
    container_name: sos_frontend_v2
    restart: always
    depends_on:
      - backend
    networks:
      - sos_internal
      - wagmoo_wagmoo_net
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=wagmoo_wagmoo_net"
      - "traefik.http.routers.sos-v2.rule=Host(`sosplanete.nnauru.net`)"
      - "traefik.http.routers.sos-v2.entrypoints=websecure"
      - "traefik.http.routers.sos-v2.tls.certresolver=myresolver"
      - "traefik.http.services.sos-v2.loadbalancer.server.port=3010"

networks:
  sos_internal:
  wagmoo_wagmoo_net:
    external: true

volumes:
  sos_db_data_v2:
